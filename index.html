<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A100 · Lavanderia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg: #EEF3F0; --panel: #FFFFFF; --ink: #172624; --ink-soft: #5B6E6C;
    --teal: #2F6F6B; --teal-dark: #1F504C; --teal-soft: #E1EEEC;
    --amber: #DE8A2C; --amber-soft: #FBEBD6;
    --red: #C0453A; --red-soft: #FBE7E4;
    --green: #2E8B57; --line: #DEE7E3; --radius: 16px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; color: var(--ink); background: var(--bg); }
  .lvc-root { padding: 20px; max-width: 1080px; margin: 0 auto; }
  .lvc-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; }
  .lvc-brand { display: flex; align-items: center; gap: 12px; }
  .lvc-logo { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; object-fit: cover; border: 2px solid var(--teal-dark); box-shadow: 0 2px 6px rgba(23,38,36,0.25); }
  .lvc-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 21px; letter-spacing: -0.02em; margin: 0; }
  .lvc-title-thin { font-weight: 500; color: var(--ink-soft); font-size: 15px; }
  .lvc-sub { font-size: 12.5px; color: var(--ink-soft); margin: 2px 0 0; }
  .lvc-savechip { font-size: 11px; color: var(--ink-soft); display:flex; align-items:center; gap:6px; }
  .lvc-nav { display: flex; gap: 6px; background: var(--panel); padding: 5px; border-radius: 999px; border: 1px solid var(--line); margin-bottom: 20px; flex-wrap: wrap; }
  .lvc-navbtn { border: none; background: transparent; padding: 9px 16px; border-radius: 999px; font-family: 'Inter'; font-weight: 600; font-size: 13.5px; color: var(--ink-soft); cursor: pointer; display:flex; align-items:center; gap:7px; transition: all .15s ease; }
  .lvc-navbtn:hover { color: var(--teal-dark); }
  .lvc-navbtn.active { background: var(--teal); color: white; }
  .lvc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .lvc-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; }
  .lvc-card-label { font-size: 11.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; margin: 0 0 6px; }
  .lvc-card-value { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  .lvc-card-foot { font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 5px; }
  .lvc-panel-balance { display: flex; align-items: center; gap: 16px; background: linear-gradient(135deg, var(--teal-dark), var(--teal)); color: white; border: none; }
  .lvc-panel-balance .lvc-card-label { color: rgba(255,255,255,0.75); }
  .lvc-dial { width: 64px; height: 64px; border-radius: 50%; flex-shrink:0; position: relative; display:flex; align-items:center; justify-content:center; }
  .lvc-dial-inner { width: 48px; height: 48px; border-radius: 50%; background: var(--teal-dark); display:flex; align-items:center; justify-content:center; font-size: 20px; }
  .lvc-section-title { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  .lvc-alert { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 8px; }
  .lvc-alert.red { background: var(--red-soft); color: #8A342B; }
  .lvc-alert.amber { background: var(--amber-soft); color: #8F5A16; }
  .lvc-empty { color: var(--ink-soft); font-size: 13px; padding: 10px 2px; }
  .lvc-list-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 4px; border-bottom: 1px solid var(--line); gap: 10px; }
  .lvc-list-row:last-child { border-bottom: none; }
  .lvc-tag { font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
  .lvc-tag.entrada { background: var(--teal-soft); color: var(--teal-dark); }
  .lvc-tag.saida { background: var(--amber-soft); color: #8F5A16; }
  .lvc-form { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; margin-bottom: 18px; }
  .lvc-formgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 12px; }
  .lvc-field label { display: block; font-size: 11.5px; font-weight: 600; color: var(--ink-soft); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  .lvc-field input, .lvc-field select { width: 100%; padding: 9px 10px; border: 1px solid var(--line); border-radius: 9px; font-family: 'Inter'; font-size: 13.5px; background: #FBFCFB; color: var(--ink); }
  .lvc-field input:focus, .lvc-field select:focus { outline: 2px solid var(--teal); outline-offset: 1px; }
  .lvc-span2 { grid-column: span 2; }
  .lvc-seg { display: flex; border-radius: 9px; overflow: hidden; border: 1px solid var(--line); }
  .lvc-seg button { flex: 1; border: none; padding: 9px 8px; font-family: 'Inter'; font-weight: 600; font-size: 13px; cursor: pointer; background: #FBFCFB; color: var(--ink-soft); display:flex; align-items:center; justify-content:center; gap:6px; }
  .lvc-seg button.on.entrada { background: var(--teal); color: white; }
  .lvc-seg button.on.saida { background: var(--amber); color: white; }
  .lvc-seg button.on.pagar { background: var(--red); color: white; }
  .lvc-seg button.on.receber { background: var(--teal); color: white; }
  .lvc-btn { border: none; background: var(--teal); color: white; padding: 10px 18px; border-radius: 9px; font-family: 'Inter'; font-weight: 600; font-size: 13.5px; cursor: pointer; display: flex; align-items: center; gap: 7px; }
  .lvc-btn:hover { background: var(--teal-dark); }
  .lvc-table-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: auto; }
  table.lvc-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.lvc-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); padding: 12px 14px; border-bottom: 1px solid var(--line); background: #FAFBFA; white-space: nowrap; }
  table.lvc-table td { padding: 11px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.lvc-table tr:last-child td { border-bottom: none; }
  .lvc-amt.entrada { color: var(--teal-dark); font-weight: 700; }
  .lvc-amt.saida { color: #8F5A16; font-weight: 700; }
  .lvc-iconbtn { border: none; background: transparent; cursor: pointer; color: var(--ink-soft); padding: 5px; border-radius: 6px; display:inline-flex; }
  .lvc-iconbtn:hover { background: var(--red-soft); color: var(--red); }
  .lvc-iconbtn.ok:hover { background: var(--teal-soft); color: var(--teal-dark); }
  .lvc-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
  .lvc-status { font-size: 11.5px; padding: 4px 10px; border-radius: 999px; font-weight: 700; }
  .lvc-status.pendente { background: var(--amber-soft); color: #8F5A16; }
  .lvc-status.pago { background: var(--teal-soft); color: var(--teal-dark); }
  .lvc-status.vencida { background: var(--red-soft); color: var(--red); }
  .lvc-bar-row { margin-bottom: 10px; }
  .lvc-bar-track { height: 8px; background: #EEF3F0; border-radius: 999px; }
  .lvc-bar-fill { height: 100%; border-radius: 999px; }
  .lvc-chart { display: flex; align-items: flex-end; gap: 14px; height: 200px; padding: 10px 4px 0; }
  .lvc-chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 4px; }
  .lvc-chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 160px; width: 100%; justify-content: center; }
  .lvc-chart-bar { width: 16px; border-radius: 4px 4px 0 0; }
  .lvc-chart-label { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }
  .lvc-legend { display: flex; gap: 16px; font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; }
  .lvc-legend span { display: flex; align-items: center; gap: 6px; }
  .lvc-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .lvc-icon { display: inline-flex; vertical-align: middle; }
  @media (max-width: 560px) { .lvc-span2 { grid-column: span 1; } }
</style>
</head>

function todayISO() { return new Date().toISOString().slice(0, 10); }
function monthKey(iso) { return iso ? iso.slice(0, 7) : ''; }
function formatBRL(v) { return (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
function formatDateBR(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function monthLabel(key) {
  if (!key) return '';
  const [y, m] = key.split('-');
  const nomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${nomes[Number(m)-1]}/${y.slice(2)}`;
}
function uid(prefix) { return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadData() {
  try {
    const { data, error } = await sb.from(TABLE).select('*').eq('id', 1).single();
    if (error) throw error;
    transactions = Array.isArray(data.transactions) ? data.transactions : [];
    contas = Array.isArray(data.contas) ? data.contas : [];
    lastSyncedJSON = JSON.stringify({ transactions, contas });
    saveErr = false;
  } catch (e) {
    console.error('Erro ao carregar dados do Supabase', e);
    saveErr = true;
  }
  dbReady = true;
  render();

  sb.channel('caixa_a100_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE, filter: 'id=eq.1' }, payload => {
      const data = payload.new;
      if (!data) return;
      const incomingJSON = JSON.stringify({ transactions: data.transactions || [], contas: data.contas || [] });
      if (incomingJSON === lastSyncedJSON) return; // evita re-render ao ecoar nossa própria escrita
      lastSyncedJSON = incomingJSON;
      transactions = Array.isArray(data.transactions) ? data.transactions : [];
      contas = Array.isArray(data.contas) ? data.contas : [];
      saveErr = false;
      render();
    })
    .subscribe();
}

async function persist() {
  const payload = { transactions, contas };
  lastSyncedJSON = JSON.stringify(payload);
  try {
    const { error } = await sb.from(TABLE).upsert({ id: 1, transactions, contas });
    if (error) throw error;
    saveErr = false;
  } catch (e) {
    console.error('Erro ao salvar no Supabase', e);
    saveErr = true;
  }
  renderSaveChip();
}

function addTransaction(tx) {
  transactions = [{ ...tx, id: uid('tx') }, ...transactions];
  persist();
}
function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  persist();
  render();
}
function addConta(conta) {
  contas = [{ ...conta, id: uid('ct'), status: 'pendente' }, ...contas];
  persist();
}
function deleteConta(id) {
  contas = contas.filter(c => c.id !== id);
  persist();
  render();
}
function settleConta(id) {
  const conta = contas.find(c => c.id === id);
  if (!conta) return;
  contas = contas.map(c => c.id === id ? { ...c, status: 'pago', paidDate: todayISO() } : c);
  const tx = {
    id: uid('tx'), date: todayISO(),
    type: conta.tipo === 'pagar' ? 'saida' : 'entrada',
    category: conta.tipo === 'pagar' ? 'Contas a pagar' : 'Contas a receber',
    description: conta.descricao, amount: conta.valor, method: 'Quitação de conta'
  };
  transactions = [tx, ...transactions];
  persist();
  render();
}
function reopenConta(id) {
  contas = contas.map(c => c.id === id ? { ...c, status: 'pendente', paidDate: null } : c);
  persist();
  render();
}

function computeAggregates() {
  const saldo = transactions.reduce((a, t) => a + (t.type === 'entrada' ? Number(t.amount) : -Number(t.amount)), 0);
  const cm = todayISO().slice(0, 7);
  const entradasMes = transactions.filter(t => t.type === 'entrada' && monthKey(t.date) === cm).reduce((a, t) => a + Number(t.amount), 0);
  const saidasMes = transactions.filter(t => t.type === 'saida' && monthKey(t.date) === cm).reduce((a, t) => a + Number(t.amount), 0);
  const pendPagar = contas.filter(c => c.tipo === 'pagar' && c.status === 'pendente');
  const pendReceber = contas.filter(c => c.tipo === 'receber' && c.status === 'pendente');
  const totalPagar = pendPagar.reduce((a, c) => a + Number(c.valor), 0);
  const totalReceber = pendReceber.reduce((a, c) => a + Number(c.valor), 0);
  const vencidas = contas.filter(c => c.status === 'pendente' && c.vencimento < todayISO());
  const lim = new Date(); lim.setDate(lim.getDate() + 3);
  const limISO = lim.toISOString().slice(0, 10);
  const aVencer = contas.filter(c => c.status === 'pendente' && c.vencimento >= todayISO() && c.vencimento <= limISO);
  return { saldo, cm, entradasMes, saidasMes, totalPagar, totalReceber, vencidas, aVencer };
}

      </div>
    </div>
    <div class="lvc-nav">
      <button class="lvc-navbtn ${tab==='painel'?'active':''}" data-tab="painel">${ICONS.wallet} Painel</button>
      <button class="lvc-navbtn ${tab==='fluxo'?'active':''}" data-tab="fluxo">${ICONS.receipt} Fluxo de caixa</button>
      <button class="lvc-navbtn ${tab==='contas'?'active':''}" data-tab="contas">${ICONS.calendar} Contas a lançar</button>
      <button class="lvc-navbtn ${tab==='relatorio'?'active':''}" data-tab="relatorio">${ICONS.trend} Relatório</button>
    </div>
    <div id="tabContent"></div>
  `;
  document.querySelectorAll('.lvc-navbtn').forEach(btn => {
    btn.addEventListener('click', () => { tab = btn.dataset.tab; render(); });
  });
  document.getElementById('btnExport').addEventListener('click', exportBackup);
  document.getElementById('btnImport').addEventListener('click', () => document.getElementById('fileImport').click());
  document.getElementById('fileImport').addEventListener('change', importBackup);
  renderTab();
}

function exportBackup() {
  const data = JSON.stringify({ transactions, contas }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `a100-lavanderia-backup-${todayISO()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.transactions) || !Array.isArray(data.contas)) throw new Error('formato inválido');
      const ok = confirm('Importar este backup vai substituir todos os dados atuais deste navegador. Deseja continuar?');
      if (!ok) return;
      transactions = data.transactions;
      contas = data.contas;
      persist();
      render();
    } catch (err) {
      alert('Não foi possível importar este arquivo. Verifique se é um backup válido gerado por este app.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function renderSaveChip() {
  const chip = document.getElementById('saveChip');
  if (chip) chip.innerHTML = saveErr ? `${ICONS.alert} sem conexão com a nuvem — verifique a internet` : `${ICONS.drop} sincronizado na nuvem`;
}

function renderTab() {
  const content = document.getElementById('tabContent');
  if (tab === 'painel') content.innerHTML = renderPainel();
  else if (tab === 'fluxo') content.innerHTML = renderFluxo();
  else if (tab === 'contas') content.innerHTML = renderContas();
  else content.innerHTML = renderRelatorio();
  attachTabEvents();
}

function renderPainel() {
  const { saldo, entradasMes, saidasMes, totalPagar, totalReceber, vencidas, aVencer } = computeAggregates();
  const recentes = transactions.slice(0, 6);
  return `
    <div class="lvc-grid">
      <div class="lvc-card lvc-panel-balance">
        <div class="lvc-dial"><div class="lvc-dial-inner">${ICONS.drop.replace('width="13" height="13"','width="20" height="20"').replace('currentColor','#fff')}</div></div>
        <div>
          <p class="lvc-card-label">Saldo em caixa</p>
          <p class="lvc-card-value">${formatBRL(saldo)}</p>
        </div>
      </div>
      <div class="lvc-card">
        <p class="lvc-card-label">Entradas do mês</p>
        <p class="lvc-card-value" style="color:var(--teal-dark)">${formatBRL(entradasMes)}</p>
        <p class="lvc-card-foot" style="color:var(--teal-dark)">${ICONS.up} ciclo atual</p>
      </div>
      <div class="lvc-card">
        <p class="lvc-card-label">Saídas do mês</p>
        <p class="lvc-card-value" style="color:#8F5A16">${formatBRL(saidasMes)}</p>
        <p class="lvc-card-foot" style="color:#8F5A16">${ICONS.down} ciclo atual</p>
      </div>
      <div class="lvc-card">
        <p class="lvc-card-label">A pagar (pendente)</p>
        <p class="lvc-card-value" style="color:var(--red)">${formatBRL(totalPagar)}</p>
      </div>
      <div class="lvc-card">
        <p class="lvc-card-label">A receber (pendente)</p>
        <p class="lvc-card-value" style="color:var(--teal-dark)">${formatBRL(totalReceber)}</p>
      </div>
    </div>
    ${(vencidas.length || aVencer.length) ? `
    <div class="lvc-card" style="margin-bottom:18px">
      <p class="lvc-section-title">${ICONS.alert.replace('currentColor','var(--amber)')} Avisos de vencimento</p>
      ${vencidas.map(c => `<div class="lvc-alert red">${ICONS.alert} <span><strong>${esc(c.descricao)}</strong> venceu em ${formatDateBR(c.vencimento)} · ${formatBRL(c.valor)} (${c.tipo==='pagar'?'a pagar':'a receber'})</span></div>`).join('')}
      ${aVencer.map(c => `<div class="lvc-alert amber">${ICONS.calendar} <span><strong>${esc(c.descricao)}</strong> vence em ${formatDateBR(c.vencimento)} · ${formatBRL(c.valor)} (${c.tipo==='pagar'?'a pagar':'a receber'})</span></div>`).join('')}
    </div>` : ''}
    <div class="lvc-card">
      <p class="lvc-section-title">${ICONS.receipt.replace('currentColor','var(--teal)')} Últimos lançamentos</p>
      ${recentes.length === 0 ? '<p class="lvc-empty">Nenhum lançamento ainda. Registre uma entrada ou saída na aba Fluxo de caixa.</p>' :
        recentes.map(t => `
        <div class="lvc-list-row">
          <div>
            <div style="font-weight:600;font-size:13.5px">${esc(t.description || t.category)}</div>
            <div style="font-size:12px;color:var(--ink-soft)">${formatDateBR(t.date)} · ${esc(t.category)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="lvc-tag ${t.type}">${t.type==='entrada'?'Entrada':'Saída'}</span>
            <span class="lvc-amt ${t.type}">${t.type==='entrada'?'+':'-'} ${formatBRL(t.amount)}</span>
          </div>
        </div>`).join('')}
    </div>
  `;
}

function renderFluxo() {
  const categorias = formType === 'entrada' ? CATEGORIAS_ENTRADA : CATEGORIAS_SAIDA;
  const months = Array.from(new Set(transactions.map(t => monthKey(t.date)))).sort().reverse();
  const filtered = transactions.filter(t => filtroFluxoMes === 'todos' || monthKey(t.date) === filtroFluxoMes);
  const totalEntrada = filtered.filter(t=>t.type==='entrada').reduce((a,t)=>a+Number(t.amount),0);
  const totalSaida = filtered.filter(t=>t.type==='saida').reduce((a,t)=>a+Number(t.amount),0);

  return `
    <form class="lvc-form" id="formFluxo">
      <p class="lvc-section-title">${ICONS.plus.replace('currentColor','var(--teal)')} Novo lançamento</p>
      <div class="lvc-formgrid">
        <div class="lvc-field">
          <label>Tipo</label>
          <div class="lvc-seg">
            <button type="button" data-type="entrada" class="${formType==='entrada'?'on entrada':''}">${ICONS.up} Entrada</button>
            <button type="button" data-type="saida" class="${formType==='saida'?'on saida':''}">${ICONS.down} Saída</button>
          </div>
        </div>
        <div class="lvc-field"><label>Data</label><input type="date" name="date" value="${todayISO()}" required></div>
        <div class="lvc-field"><label>Categoria</label>
          <select name="category">${categorias.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select>
        </div>
        <div class="lvc-field"><label>Forma</label>
          <select name="method">${FORMAS_PAGAMENTO.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join('')}</select>
        </div>
        <div class="lvc-field"><label>Valor (R$)</label><input type="number" name="amount" min="0" step="0.01" placeholder="0,00" required></div>
        <div class="lvc-field lvc-span2"><label>Descrição (opcional)</label><input type="text" name="description" placeholder="Ex.: troco de moedas, conserto da secadora 3..."></div>
      </div>
      <button class="lvc-btn" type="submit">${ICONS.plus} Lançar ${formType==='entrada'?'entrada':'saída'}</button>
    </form>
    <div class="lvc-toolbar">
      <div style="display:flex;gap:14px;font-size:13.5px">
        <span style="color:var(--teal-dark);font-weight:700">+ ${formatBRL(totalEntrada)}</span>
        <span style="color:#8F5A16;font-weight:700">- ${formatBRL(totalSaida)}</span>
      </div>
      <div class="lvc-field" style="min-width:160px">
        <select id="filtroFluxoMes">
          <option value="todos" ${filtroFluxoMes==='todos'?'selected':''}>Todos os meses</option>
          ${months.map(m=>`<option value="${m}" ${filtroFluxoMes===m?'selected':''}>${monthLabel(m)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="lvc-table-wrap">
      <table class="lvc-table">
        <thead><tr><th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th><th>Forma</th><th>Valor</th><th></th></tr></thead>
        <tbody>
          ${filtered.length===0 ? `<tr><td colspan="7" style="color:var(--ink-soft);text-align:center;padding:20px">Nenhum lançamento neste período.</td></tr>` :
            filtered.map(t => `
            <tr>
              <td>${formatDateBR(t.date)}</td>
              <td><span class="lvc-tag ${t.type}">${t.type==='entrada'?'Entrada':'Saída'}</span></td>
              <td>${esc(t.category)}</td>
              <td>${esc(t.description) || '—'}</td>
              <td>${esc(t.method)}</td>
              <td class="lvc-amt ${t.type}">${t.type==='entrada'?'+':'-'} ${formatBRL(t.amount)}</td>
              <td><button class="lvc-iconbtn" data-del-tx="${t.id}" title="Excluir">${ICONS.trash}</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function statusOf(c) {
  if (c.status === 'pago') return 'pago';
  if (c.vencimento < todayISO()) return 'vencida';
  return 'pendente';
}

function renderContas() {
  let lista = [...contas];
  if (filtroContas === 'pagar') lista = lista.filter(c => c.tipo === 'pagar');
  if (filtroContas === 'receber') lista = lista.filter(c => c.tipo === 'receber');
  if (filtroContas === 'pendentes') lista = lista.filter(c => c.status === 'pendente');
  if (filtroContas === 'pagas') lista = lista.filter(c => c.status === 'pago');
  lista.sort((a,b) => (a.vencimento||'').localeCompare(b.vencimento||''));

  return `
    <form class="lvc-form" id="formConta">
      <p class="lvc-section-title">${ICONS.plus.replace('currentColor','var(--teal)')} Nova conta a lançar</p>
      <div class="lvc-formgrid">
        <div class="lvc-field">
          <label>Tipo</label>
          <div class="lvc-seg">
            <button type="button" data-tipoconta="pagar" class="${formTipoConta==='pagar'?'on pagar':''}">A pagar</button>
            <button type="button" data-tipoconta="receber" class="${formTipoConta==='receber'?'on receber':''}">A receber</button>
          </div>
        </div>
        <div class="lvc-field lvc-span2"><label>Descrição</label><input type="text" name="descricao" placeholder="Ex.: fatura de energia, aluguel do ponto..." required></div>
        <div class="lvc-field"><label>Valor (R$)</label><input type="number" name="valor" min="0" step="0.01" placeholder="0,00" required></div>
        <div class="lvc-field"><label>Vencimento</label><input type="date" name="vencimento" value="${todayISO()}" required></div>
      </div>
      <button class="lvc-btn" type="submit">${ICONS.plus} Adicionar conta</button>
    </form>
    <div class="lvc-toolbar">
      <div class="lvc-field" style="min-width:180px">
        <select id="filtroContas">
          <option value="todas" ${filtroContas==='todas'?'selected':''}>Todas as contas</option>
          <option value="pagar" ${filtroContas==='pagar'?'selected':''}>Somente a pagar</option>
          <option value="receber" ${filtroContas==='receber'?'selected':''}>Somente a receber</option>
          <option value="pendentes" ${filtroContas==='pendentes'?'selected':''}>Somente pendentes</option>
          <option value="pagas" ${filtroContas==='pagas'?'selected':''}>Somente quitadas</option>
        </select>
      </div>
    </div>
    <div class="lvc-table-wrap">
      <table class="lvc-table">
        <thead><tr><th>Vencimento</th><th>Tipo</th><th>Descrição</th><th>Valor</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${lista.length===0 ? `<tr><td colspan="6" style="color:var(--ink-soft);text-align:center;padding:20px">Nenhuma conta encontrada.</td></tr>` :
            lista.map(c => {
              const st = statusOf(c);
              return `
              <tr>
                <td>${formatDateBR(c.vencimento)}</td>
                <td><span class="lvc-tag ${c.tipo==='pagar'?'saida':'entrada'}">${c.tipo==='pagar'?'A pagar':'A receber'}</span></td>
                <td>${esc(c.descricao)}</td>
                <td class="lvc-amt ${c.tipo==='pagar'?'saida':'entrada'}">${formatBRL(c.valor)}</td>
                <td><span class="lvc-status ${st}">${st==='pago'?'Quitada':st==='vencida'?'Vencida':'Pendente'}</span></td>
                <td>
                  ${c.status==='pendente'
                    ? `<button class="lvc-iconbtn ok" data-settle="${c.id}" title="Marcar como quitada">${ICONS.check}</button>`
                    : `<button class="lvc-iconbtn" data-reopen="${c.id}" title="Reabrir conta">${ICONS.redo}</button>`}
                  <button class="lvc-iconbtn" data-del-conta="${c.id}" title="Excluir">${ICONS.trash}</button>
                </td>
              </tr>`;
            }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderRelatorio() {
  const map = {};
  transactions.forEach(t => {
    const k = monthKey(t.date);
    if (!map[k]) map[k] = { key: k, Entradas: 0, Saidas: 0 };
    if (t.type === 'entrada') map[k].Entradas += Number(t.amount);
    else map[k].Saidas += Number(t.amount);
  });
  const chartData = Object.values(map).sort((a,b)=>a.key.localeCompare(b.key)).slice(-6);
  const maxVal = Math.max(1, ...chartData.map(d => Math.max(d.Entradas, d.Saidas)));

  const { cm } = computeAggregates();
  const catMap = {};
  transactions.filter(t => monthKey(t.date) === cm).forEach(t => {
    if (!catMap[t.category]) catMap[t.category] = { category: t.category, type: t.type, total: 0 };
    catMap[t.category].total += Number(t.amount);
  });
  const categoriasMes = Object.values(catMap).sort((a,b)=>b.total-a.total);
  const maxCat = Math.max(1, ...categoriasMes.map(c=>c.total));

  return `
    <div class="lvc-card" style="margin-bottom:18px">
      <p class="lvc-section-title">${ICONS.trend.replace('currentColor','var(--teal)')} Entradas x saídas (últimos meses)</p>
      ${chartData.length === 0 ? '<p class="lvc-empty">Ainda não há dados suficientes para o gráfico. Comece registrando lançamentos no Fluxo de caixa.</p>' : `
      <div class="lvc-legend">
        <span><span class="lvc-dot" style="background:#2F6F6B"></span> Entradas</span>
        <span><span class="lvc-dot" style="background:#DE8A2C"></span> Saídas</span>
      </div>
      <div class="lvc-chart">
        ${chartData.map(d => `
          <div class="lvc-chart-col">
            <div class="lvc-chart-bars">
              <div class="lvc-chart-bar" style="height:${Math.round((d.Entradas/maxVal)*160)}px;background:#2F6F6B" title="${formatBRL(d.Entradas)}"></div>
              <div class="lvc-chart-bar" style="height:${Math.round((d.Saidas/maxVal)*160)}px;background:#DE8A2C" title="${formatBRL(d.Saidas)}"></div>
            </div>
            <div class="lvc-chart-label">${monthLabel(d.key)}</div>
          </div>`).join('')}
      </div>`}
    </div>
    <div class="lvc-card">
      <p class="lvc-section-title">${ICONS.receipt.replace('currentColor','var(--amber)')} Categorias do mês atual</p>
      ${categoriasMes.length === 0 ? '<p class="lvc-empty">Nenhum lançamento neste mês ainda.</p>' :
        categoriasMes.map(c => `
        <div class="lvc-bar-row">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span>${esc(c.category)}</span>
            <span style="font-weight:700;color:${c.type==='entrada'?'var(--teal-dark)':'#8F5A16'}">${formatBRL(c.total)}</span>
          </div>
          <div class="lvc-bar-track"><div class="lvc-bar-fill" style="width:${(c.total/maxCat)*100}%;background:${c.type==='entrada'?'var(--teal)':'var(--amber)'}"></div></div>
        </div>`).join('')}
    </div>
  `;
}

function attachTabEvents() {
  if (tab === 'fluxo') {
    document.querySelectorAll('#formFluxo .lvc-seg button').forEach(btn => {
      btn.addEventListener('click', () => { formType = btn.dataset.type; renderTab(); });
    });
    const form = document.getElementById('formFluxo');
    form.addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(form);
      const amount = Number(fd.get('amount'));
      if (!amount || amount <= 0) return;
      addTransaction({
        type: formType, date: fd.get('date'), category: fd.get('category'),
        description: fd.get('description'), amount, method: fd.get('method')
      });
      renderTab();
    });
    const selMes = document.getElementById('filtroFluxoMes');
    if (selMes) selMes.addEventListener('change', () => { filtroFluxoMes = selMes.value; renderTab(); });
    document.querySelectorAll('[data-del-tx]').forEach(btn => {
      btn.addEventListener('click', () => deleteTransaction(btn.dataset.delTx));
    });
  }
  if (tab === 'contas') {
    document.querySelectorAll('#formConta .lvc-seg button').forEach(btn => {
      btn.addEventListener('click', () => { formTipoConta = btn.dataset.tipoconta; renderTab(); });
    });
    const form = document.getElementById('formConta');
    form.addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(form);
      const valor = Number(fd.get('valor'));
      const descricao = fd.get('descricao');
      if (!descricao || !valor || valor <= 0) return;
      addConta({ tipo: formTipoConta, descricao, valor, vencimento: fd.get('vencimento') });
      renderTab();
    });
    const selFiltro = document.getElementById('filtroContas');
    if (selFiltro) selFiltro.addEventListener('change', () => { filtroContas = selFiltro.value; renderTab(); });
    document.querySelectorAll('[data-settle]').forEach(btn => btn.addEventListener('click', () => settleConta(btn.dataset.settle)));
    document.querySelectorAll('[data-reopen]').forEach(btn => btn.addEventListener('click', () => reopenConta(btn.dataset.reopen)));
    document.querySelectorAll('[data-del-conta]').forEach(btn => btn.addEventListener('click', () => deleteConta(btn.dataset.delConta)));
  }
}

loadData();
</script>
</body>
</html>
